<!DOCTYPE html>
<html lang="es">
<head>

<base target="_top">

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Siguiendo al Conejo Blanco</title>

<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@600;700&family=Inter:wght@400;600;700&display=swap" rel="stylesheet">


<style>

:root{
--azul:#0F3D7A;
--azulOscuro:#03152B;
--blanco:#ffffff;
--texto:#dce9ff;
}


*{
margin:0;
padding:0;
box-sizing:border-box;
}


body{

min-height:100vh;

font-family:'Inter',sans-serif;

color:white;

background:

radial-gradient(circle at top,#2d6fd3,transparent 35%),
linear-gradient(180deg,#03152B,#0F3D7A);

}



body:before{

content:"";

position:fixed;

inset:0;

background-image:
radial-gradient(white 1px,transparent 1px);

background-size:45px 45px;

opacity:.12;

}



.loader{

position:fixed;

inset:0;

background:#03152B;

display:flex;

align-items:center;

justify-content:center;

flex-direction:column;

z-index:999;

transition:.8s;

}


.loader span{

width:90px;

height:90px;

border-radius:50%;

border:5px solid rgba(255,255,255,.2);

border-top-color:white;

animation:girar 1s linear infinite;

}



.loader h2{

margin-top:25px;

font-family:Cinzel;

letter-spacing:3px;

}



@keyframes girar{

to{

transform:rotate(360deg);

}

}




.contenedor{

display:none;

max-width:1100px;

margin:auto;

padding:40px;

}



.panel{

background:rgba(255,255,255,.10);

border:1px solid rgba(255,255,255,.18);

border-radius:30px;

padding:45px;

backdrop-filter:blur(20px);

box-shadow:0 30px 80px rgba(0,0,0,.4);

}



h1,h2{

font-family:Cinzel;

}



h1{

font-size:45px;

text-align:center;

}



.subtitulo{

text-align:center;

color:var(--texto);

margin-top:15px;

}



.formulario{

text-align:center;

margin-top:45px;

}



input{

width:100%;

max-width:450px;

padding:18px;

border-radius:15px;

border:none;

font-size:18px;

text-align:center;

}



button{

margin-top:25px;

padding:16px 35px;

border:none;

border-radius:15px;

background:white;

color:#0F3D7A;

font-weight:bold;

cursor:pointer;

}



.resultado{

display:none;

margin-top:40px;

}



.tarjeta{

background:white;

color:#123;

border-radius:25px;

padding:30px;

text-align:center;

}



.tarjeta h2{

font-size:35px;

}



.tarjeta p{

color:#345;

margin-top:15px;

}



.imagenes{

display:grid;

grid-template-columns:1fr 1fr;

gap:20px;

margin-top:30px;

}



.imagenes img{

width:100%;

border-radius:20px;

box-shadow:0 20px 40px rgba(0,0,0,.25);

}



@media(max-width:700px){

.imagenes{

grid-template-columns:1fr;

}


h1{

font-size:32px;

}


}


</style>

</head>


<body>



<div class="loader" id="loader">

<span></span>

<h2>SIGUIENDO AL CONEJO BLANCO</h2>

</div>




<div class="contenedor" id="app">


<div class="panel">


<h1>

Siguiendo al Conejo Blanco

</h1>


<p class="subtitulo">

Descubre tu patrón de atención

</p>



<div class="formulario">


<input

id="codigo"

value="<?= idParticipante ?>"

placeholder="CB-0001">


<br>


<button onclick="buscar()">

Descubrir mi patrón

</button>


</div>




<div class="resultado" id="resultado">


<div class="tarjeta">


<h2 id="nombre"></h2>


<p id="patron"></p>



<div class="imagenes">


<img id="frente">


<img id="reverso">


</div>


</div>


</div>



</div>


</div>




<script>


window.onload=function(){


setTimeout(function(){


document.getElementById("loader").style.opacity="0";


setTimeout(function(){


document.getElementById("loader").style.display="none";

document.getElementById("app").style.display="block";


},800);


},1200);


};




function buscar(){


let id=document.getElementById("codigo").value.trim();



if(!id){

alert("Ingresa tu código");

return;

}



google.script.run


.withSuccessHandler(function(data){



if(!data.ok){

alert(data.mensaje);

return;

}



document.getElementById("resultado").style.display="block";



document.getElementById("nombre").innerHTML=data.nombre;



document.getElementById("patron").innerHTML=

"Tu patrón de atención: <b>"+data.patron+"</b>";



document.getElementById("frente").src=data.imagenFrente;



document.getElementById("reverso").src=data.imagenReverso;



})


.withFailureHandler(function(error){


alert("Error de conexión");

console.log(error);


})


.buscarPatronPorId(id);



}



</script>


</body>

</html>
